name: CodeQL

on:
  push:
  pull_request:
  schedule:
    - cron: "17 4 * * 1"

jobs:
  analyze:
    runs-on: windows-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: github/codeql-action/init@v4.36.2
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4.36.2
