name: Préparer l'environnement de revue

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - ".github/copilot-instructions.md"
      - "AGENTS.md"
      - "pyproject.toml"
      - "scripts/agent_validate.py"
  pull_request:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - ".github/copilot-instructions.md"
      - "AGENTS.md"
      - "pyproject.toml"
      - "scripts/agent_validate.py"

jobs:
  copilot-setup-steps:
    runs-on: windows-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
      - name: Installer le projet
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Vérifier les imports
        run: |
          python -c "from employeurd_megagest.version import __version__; print(__version__)"
